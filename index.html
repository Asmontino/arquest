<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ARQuest Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family: monospace; overflow:hidden; width:100vw; height:100vh; }
    #video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
    #debug {
      position:fixed; top:0; left:0; right:0;
      z-index:100; background:rgba(0,0,0,0.75);
      color:#4ade80; font-size:13px;
      padding:10px 12px; line-height:1.6;
    }
    #scan-hint {
      position:fixed; bottom:40px; left:0; right:0;
      text-align:center; color:#fff; font-size:16px;
      background:rgba(0,0,0,0.5); padding:10px; z-index:100;
    }
    #qr-canvas { display:none; }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="qr-canvas"></canvas>
  <div id="debug">Запуск...</div>
  <div id="scan-hint">Наведи камеру на QR-код</div>

  <script>
    const video  = document.getElementById('video');
    const canvas = document.getElementById('qr-canvas');
    const ctx    = canvas.getContext('2d');
    const dbg    = document.getElementById('debug');
    let attempts = 0;
    let scanStarted = false;

    function log(msg) { dbg.innerHTML = msg; }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = stream;
        await video.play();
        log('✅ jsQR загружен<br>✅ Камера запущена<br>⏳ Запускаємо сканування...');

        // Запускаем сразу через таймер — не ждём loadeddata
        setTimeout(() => {
          log('✅ jsQR загружен<br>✅ Камера запущена<br>✅ Сканування активне<br>🔍 Шукаємо QR...');
          setInterval(tryDecode, 400);
          scanStarted = true;
        }, 1500);

      } catch(e) {
        log('❌ Помилка камери: ' + e.message);
      }
    }

    function tryDecode() {
      // Если видео ещё не дало размер — пропускаем
      if (video.videoWidth === 0) {
        attempts++;
        log('✅ Камера запущена<br>⏳ Відео ще не готове (спроба ' + attempts + ')');
        return;
      }

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, {
        inversionAttempts: 'attemptBoth'
      });

      attempts++;
      if (code) {
        log('🎉 QR знайдено!<br>Текст: ' + code.data);
      } else {
        log('✅ Камера: ' + canvas.width + 'x' + canvas.height
          + '<br>🔍 Спроба #' + attempts + ' — QR не знайдено<br>Наведи камеру на QR...');
      }
    }

    startCamera();
  </script>
</body>
</html>
